name: qpay_app
description: QPay mobile client — Flutter iOS + Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.1
  google_fonts: ^6.2.1
  supabase_flutter: ^2.8.1
  http: ^1.2.2
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/data/sic_codes.json

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  # Android adaptive icon — same Q on warm black
  adaptive_icon_background: "#1A1410"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
